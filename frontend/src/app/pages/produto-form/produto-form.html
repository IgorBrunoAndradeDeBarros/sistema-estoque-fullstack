<div class="form-card">
  <h3>Cadastrar Novo Produto</h3>

  <form [formGroup]="produtoForm" (ngSubmit)="salvar()">

    <div class="form-grid">
      <div class="form-group">
        <label>Código do Produto *</label>
        <input type="text" formControlName="codigo" placeholder="Ex: SKU-001">
        <small class="text-danger" *ngIf="produtoForm.get('codigo')?.invalid && produtoForm.get('codigo')?.touched">
          Código é obrigatório.
        </small>
      </div>

      <div class="form-group">
        <label>Nome do Produto *</label>
        <input type="text" formControlName="nome" placeholder="Ex: Notebook Dell">
        <small class="text-danger" *ngIf="produtoForm.get('nome')?.invalid && produtoForm.get('nome')?.touched">
          Nome é obrigatório.
        </small>
      </div>

      <div class="form-group">
        <label>Categoria *</label>
        <input type="text" formControlName="categoria" placeholder="Ex: Eletrônicos">
        <small class="text-danger" *ngIf="produtoForm.get('categoria')?.invalid && produtoForm.get('categoria')?.touched">
          Categoria é obrigatória.
        </small>
      </div>

      <div class="form-group">
        <label>Unidade de Medida *</label>
        <select formControlName="unidade">
          <option value="UN">Unidade (UN)</option>
          <option value="CX">Caixa (CX)</option>
          <option value="KG">Quilo (KG)</option>
          <option value="LT">Litro (LT)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Preço Base (R$) *</label>
        <input type="number" formControlName="preco" step="0.01">
        <small class="text-danger" *ngIf="produtoForm.get('preco')?.invalid && produtoForm.get('preco')?.touched">
          Preço inválido.
        </small>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="cancelar()" [disabled]="salvando">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="produtoForm.invalid || salvando">
        {{ salvando ? 'Salvando...' : 'Salvar Produto' }}
      </button>
    </div>

  </form>
</div>
