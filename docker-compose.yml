version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: estoque-postgres
    environment:
      POSTGRES_DB: estoque_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - estoque-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  estoque-api:
    build:
      context: .
      dockerfile: backend/src/main/docker/Dockerfile.jvm
    container_name: estoque-api
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/estoque_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy

  estoque-front:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    container_name: estoque-front
    ports:
      - "4200:80"
    depends_on:
      - estoque-api

volumes:
  estoque-postgres-data: